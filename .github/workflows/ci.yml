name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  qa:
    name: Type check, lint, build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build
        env:
          # Dummy values so build doesn't fail on missing env at compile time.
          # Real secrets are only needed at runtime in Cloudflare.
          SESSION_SECRET: ci-dummy-session-secret-not-used-at-runtime
          DISCORD_CLIENT_ID: ci-dummy
          DISCORD_CLIENT_SECRET: ci-dummy
          DISCORD_REDIRECT_URI: http://localhost:3000/api/auth/discord
          RIOT_CLIENT_ID: ci-dummy
          RIOT_CLIENT_SECRET: ci-dummy
          RIOT_API_KEY: ci-dummy
          RIOT_REDIRECT_URI: http://localhost:3000/api/connect/riot/callback
          APP_URL: http://localhost:3000
