name: Deploy — Staging

# Runs on every push to master AFTER ci.yml gates pass.
# Configure the "staging" GitHub Environment (repo Settings → Environments)
# with any desired wait timers or required reviewers.

on:
  push:
    branches: [master]

permissions:
  contents: read

concurrency:
  group: staging
  cancel-in-progress: true

environment: staging

jobs:
  build:
    name: Build worker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4 # reads packageManager from package.json
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: pnpm }
      - run: pnpm install --frozen-lockfile

      - name: Build OpenNext worker
        run: pnpm build:worker
        env:
          SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
          DISCORD_CLIENT_ID: ci-dummy
          DISCORD_CLIENT_SECRET: ci-dummy
          DISCORD_REDIRECT_URI: http://localhost:3000/auth/callback
          RIOT_CLIENT_ID: ci-dummy
          RIOT_CLIENT_SECRET: ci-dummy
          RIOT_API_KEY: ci-dummy
          RIOT_REDIRECT_URI: http://localhost:3000/api/connect/riot/callback
          APP_URL: http://localhost:3000

      - name: Upload worker artifact
        uses: actions/upload-artifact@v4
        with:
          name: worker-staging
          path: .open-next/
          retention-days: 1

  deploy:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: pnpm }
      - run: pnpm install --frozen-lockfile

      - uses: actions/download-artifact@v4
        with: { name: worker-staging, path: .open-next/ }

      - name: Apply D1 migrations (staging)
        run: pnpm exec wrangler d1 migrations apply procard-db-staging --remote --env staging
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN_STAGING }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

      - name: Deploy worker (staging)
        run: pnpm exec wrangler deploy --env staging
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN_STAGING }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
