name: Deploy — Production

# Triggers on master merges/pushes or manual dispatch.
# The "production" GitHub Environment should have required reviewers configured
# (repo Settings → Environments → production) to gate every prod deploy.

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

# Never cancel a production deploy mid-flight.
concurrency:
  group: production
  cancel-in-progress: false

jobs:
  deploy:
    name: Build and deploy worker
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile

      - name: Validate required secrets
        run: node scripts/assert-secrets.mjs
        env:
          SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
          DISCORD_CLIENT_ID: ${{ secrets.DISCORD_CLIENT_ID }}
          DISCORD_CLIENT_SECRET: ${{ secrets.DISCORD_CLIENT_SECRET }}
          DISCORD_REDIRECT_URI: ${{ secrets.DISCORD_REDIRECT_URI }}
          RIOT_API_KEY: ${{ secrets.RIOT_API_KEY }}
          APP_URL: ${{ secrets.APP_URL }}

      - name: Build OpenNext worker
        run: pnpm build:worker
        env:
          SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
          DISCORD_CLIENT_ID: ${{ secrets.DISCORD_CLIENT_ID }}
          DISCORD_CLIENT_SECRET: ${{ secrets.DISCORD_CLIENT_SECRET }}
          DISCORD_REDIRECT_URI: ${{ secrets.DISCORD_REDIRECT_URI }}
          RIOT_CLIENT_ID: ${{ secrets.RIOT_CLIENT_ID }}
          RIOT_CLIENT_SECRET: ${{ secrets.RIOT_CLIENT_SECRET }}
          RIOT_API_KEY: ${{ secrets.RIOT_API_KEY }}
          RIOT_REDIRECT_URI: ${{ secrets.RIOT_REDIRECT_URI }}
          APP_URL: ${{ secrets.APP_URL }}

      - name: Patch worker bundle for Cloudflare
        run: node scripts/patch-handler.mjs

      - name: Check Cloudflare deploy secrets
        run: |
          if [ -z "${CLOUDFLARE_API_TOKEN}" ]; then
            echo "Cloudflare API token missing (CLOUDFLARE_API_TOKEN or CF_API_TOKEN)."
            echo "Skipping D1 migrations and deploy for this run."
          fi
          if [ -z "${CLOUDFLARE_EMAIL}" ]; then
            echo "Cloudflare email missing (CLOUDFLARE_EMAIL or CF_EMAIL)."
            echo "Skipping D1 migrations and deploy for this run."
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN || secrets.CF_API_TOKEN }}
          CLOUDFLARE_EMAIL: ${{ secrets.CLOUDFLARE_EMAIL || secrets.CF_EMAIL }}

      - name: Apply D1 migrations (production)
        if: ${{ (secrets.CLOUDFLARE_API_TOKEN != '' || secrets.CF_API_TOKEN != '') && (secrets.CLOUDFLARE_EMAIL != '' || secrets.CF_EMAIL != '') }}
        run: pnpm exec wrangler d1 migrations apply procard-db-prod --remote --env production
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN || secrets.CF_API_TOKEN }}
          CLOUDFLARE_EMAIL: ${{ secrets.CLOUDFLARE_EMAIL || secrets.CF_EMAIL }}

      - name: Deploy worker (production)
        if: ${{ (secrets.CLOUDFLARE_API_TOKEN != '' || secrets.CF_API_TOKEN != '') && (secrets.CLOUDFLARE_EMAIL != '' || secrets.CF_EMAIL != '') }}
        run: pnpm exec wrangler deploy --env production --no-bundle --config wrangler.patched.toml
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN || secrets.CF_API_TOKEN }}
          CLOUDFLARE_EMAIL: ${{ secrets.CLOUDFLARE_EMAIL || secrets.CF_EMAIL }}

      - name: Production smoke test (best-effort)
        if: ${{ (secrets.CLOUDFLARE_API_TOKEN != '' || secrets.CF_API_TOKEN != '') && (secrets.CLOUDFLARE_EMAIL != '' || secrets.CF_EMAIL != '') }}
        continue-on-error: true
        run: pnpm exec playwright test tests/e2e/smoke.spec.ts --config playwright.config.ts
        env:
          E2E_BASE_URL: https://procard.gg
          SKIP_DEV_SERVER: "true"
