<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <!-- Neutral dark: low-contrast angular geometry, no accent -->
  <defs>
    <linearGradient id="base" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#12151C"/>
      <stop offset="1" stop-color="#080A0E"/>
    </linearGradient>
    <radialGradient id="vig" cx="50%" cy="42%" r="80%">
      <stop offset="40%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.6"/>
    </radialGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#base)"/>
  <g fill="#FFFFFF">
    <polygon points="0,900 380,420 720,900" fill-opacity="0.022"/>
    <polygon points="520,900 980,300 1240,900" fill-opacity="0.03"/>
    <polygon points="1080,900 1460,460 1600,640 1600,900" fill-opacity="0.018"/>
    <polygon points="0,0 0,260 360,0" fill-opacity="0.02"/>
    <polygon points="1600,0 1180,0 1600,300" fill-opacity="0.025"/>
  </g>
  <rect width="1600" height="900" fill="url(#vig)"/>
</svg>
