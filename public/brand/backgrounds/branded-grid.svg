<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <!-- Branded background: dark base, subtle tech grid, faint ProCard shield watermark bottom-right -->
  <defs>
    <linearGradient id="base" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#10131A"/>
      <stop offset="1" stop-color="#080A0E"/>
    </linearGradient>
    <pattern id="grid" width="56" height="56" patternUnits="userSpaceOnUse">
      <path d="M56 0 H0 V56" fill="none" stroke="#FFFFFF" stroke-opacity="0.025" stroke-width="1"/>
    </pattern>
    <radialGradient id="vig" cx="50%" cy="40%" r="80%">
      <stop offset="35%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.6"/>
    </radialGradient>
    <radialGradient id="embert" cx="50%" cy="0%" r="60%">
      <stop offset="0" stop-color="#FF5C00" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#FF5C00" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#base)"/>
  <rect width="1600" height="900" fill="url(#grid)"/>
  <rect width="1600" height="900" fill="url(#embert)"/>
  <!-- Shield mark watermark, bottom-right, faint -->
  <g transform="translate(1320 640) scale(3.4)" opacity="0.05">
    <path d="M0 -78 L66 -52 V8 C66 56 38 86 0 104 C-38 86 -66 56 -66 8 V-52 Z"
          fill="none" stroke="#FFFFFF" stroke-width="5"/>
    <path d="M-26 -34 H10 a26 26 0 0 1 0 52 H-10 V46 H-26 Z M-10 -18 V2 H8 a10 10 0 0 0 0 -20 Z"
          fill="#FF5C00"/>
  </g>
  <rect width="1600" height="900" fill="url(#vig)"/>
</svg>
